#####################################################################
#   Includes
#####################################################################
[include mainsail.cfg]
[pause_resume]
[skew_correction]
[exclude_object]
[gcode_arcs]
resolution: 0.1

#####################################################################
#   MCU Configuration
#####################################################################
[mcu]
canbus_uuid: 0489c6e6faeb

[mcu EBBCan]
canbus_uuid: 03212fd823f1

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_3FA98B814E5737374D202020FF0B1513-if00
x_offset: 0
y_offset: 20.6
mesh_main_direction: x
mesh_runs: 2
# Contact mode
home_xy_position: 175, 175          # Bed center for Z homing
home_z_hop: 5
home_z_hop_speed: 60                # was 30 - beacon handles faster fine
home_xy_move_speed: 300
home_method: contact                # Use contact for initial home - self calibrating
home_method_when_homed: proximity   # Use fast proximity scan for subsequent homes
home_autocalibrate: unhomed         # Auto calibrate beacon model on first home only
contact_max_hotend_temperature: 180 # Max temp for contact probing - safe for PEI
contact_sensitivity: 2              # was 1 - 2 is more reliable, less false trigger prone
# Sensorless homing hooks - replace homing_override for XY
home_gcode_pre_x:  _HOME_PRE_AXIS AXIS=X
home_gcode_post_x: _HOME_POST_AXIS AXIS=X
home_gcode_pre_y:  _HOME_PRE_AXIS AXIS=Y
home_gcode_post_y: _HOME_POST_AXIS AXIS=Y

#[nevermore]
# If you're using USB instead of BT, uncomment and specify the correct serial device.
# WARNING: Make sure it's the `-if02` interface, not `-if00`.
#serial: /dev/serial/by-id/usb-Nevermore_Filter_<board>_<device-id>-if02

# These `fan_power_*` entries are for a DELTA BFB0712HF (StealthMax BOM)
# If you have a different fan then play with these numbers to the satisfaction.
# See full config documentation for details.
# (e.g. See `fan_power_automatic` if you'd prefer very quiet background filtering.)
#fan_power_coefficient: 0.8  # lower max power to keep things much more quiet

# If the fan isn't a DELTA BFB0712HF (StealthMax BOM), you'll probably want to add
#   fan_power_minimum: ???
#   fan_power_kick_start_minimum: ???
# See full-doc for details and some common values.

# Optional
# This 'temperature' sensor only serves to draw the intake VOC index on
# Mainsail/Fluidd's temperature plot.
#[temperature_sensor nevermore_intake_VOC]
#sensor_type: NevermoreSensor
#sensor_kind: intake
#plot_voc: true

[auto_speed]
# Sensorless homing has step variance — default max_missed=1.0 will false-positive
max_missed: 10.0
# Tested axes - X, Y, both diagonals (skip Z, it's slow and rarely the limit on a 2.4)
axis: x, y, diag_x, diag_y
# Z height for tests
# (use a generous height so you don't probe-strike during tests)
margin: 30
# Don't push past sane limits even if motors could go higher
accel_max: 30000
velocity_max: 800
# Conservative derate - take 80% of measured max for "recommended"
derate: 0.8
results_dir: ~/printer_data/config/auto_speed_results

#####################################################################
#   Printer Settings
#####################################################################
[printer]
kinematics: corexy
max_velocity: 600
max_accel: 3690                     # Balanced: 60% over Y quality ceiling
square_corner_velocity: 5
max_z_velocity: 15
max_z_accel: 350
minimum_cruise_ratio: 0.5

[force_move]
enable_force_move: True

[idle_timeout]
timeout: 7200                       # was 21600 - 2hr safe envelope for M600 walks without burning steppers

#####################################################################
#   X/Y Stepper Settings
#####################################################################
## X Stepper on Motor1 (B Motor)
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 64
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: -5
position_endstop: 350
position_max: 350
homing_speed: 60
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC4
interpolate: false
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PG6
run_current: 0.8

[autotune_tmc stepper_x]
motor: omc-17hs19-2004s1
sg4_thrs: 80    # reduced from 100 - less sensitive to avoid false stall triggers on startup

## Y Stepper on Motor2 (A Motor)
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 64
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min: -5
position_endstop: 356
position_max: 356
homing_speed: 60
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PD11
interpolate: false
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PG9
run_current: 0.8

[autotune_tmc stepper_y]
motor: omc-17hs19-2004s1
sg4_thrs: 125

#####################################################################
#   Z Stepper Settings
#####################################################################
## Z0 Stepper - Front Left on MOTOR3_A
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop
homing_retract_dist: 0
position_max: 250
position_min: -15
homing_speed: 8
second_homing_speed: 3

[tmc2209 stepper_z]
uart_pin: PC6
interpolate: false                  # was true - voron docs recommend false on Z
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

## Z1 Stepper - Rear Left on Motor5
[stepper_z1]
step_pin: PG4
dir_pin: !PC1
enable_pin: !PA2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PC7
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

## Z2 Stepper - Rear Right on Motor6
[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

## Z3 Stepper - Front Right on Motor7
[stepper_z3]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: PE4
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Extruder
#####################################################################
[extruder]
step_pin: EBBCan:gpio18
dir_pin: EBBCan:gpio19
enable_pin: !EBBCan:gpio17
microsteps: 16
rotation_distance: 47.088
gear_ratio: 9:1
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: EBBCan:gpio7
sensor_type: ATC Semitec 104GT-2
sensor_pin: EBBCan:gpio27
max_power: 0.8                      # X1C ceramic - prevent overshoot/oscillation (re-tune PID at this power)
min_temp: 0
max_temp: 325
max_extrude_only_distance: 200      # was 101 - bump for LOAD/UNLOAD headroom
max_extrude_cross_section: 5
pressure_advance: 0.05
pressure_advance_smooth_time: 0.020

[tmc2209 extruder]
uart_pin: EBBCan:gpio20
run_current: 0.6
stealthchop_threshold: 0            # was 5 - cleanly disable; 5 is worst-of-both-worlds
sense_resistor: 0.110

[filament_switch_sensor switch_sensor]
switch_pin: ^PG12
pause_on_runout: True
runout_gcode:
    PAUSE
    M117 Filament switch runout
insert_gcode:
    M117 Filament switch inserted

[filament_motion_sensor encoder_sensor]
switch_pin: ^PG13
smart: true
detection_length: 5.76
extruder: extruder
pause_on_runout: True
runout_gcode:
    PAUSE
    M117 Filament encoder runout
insert_gcode:
    M117 Filament encoder inserted

#####################################################################
#   Bed Heater
#####################################################################
[heater_bed]
heater_pin: PA3
sensor_type: Generic 3950
sensor_pin: PF3
max_power: 0.7                      # was 1.0 - reduce peak AC draw; re-tune PID after this change
min_temp: 0
max_temp: 120
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769

#####################################################################
#   Bed Mesh
#####################################################################
[bed_mesh]
speed: 200                          # was 500 - 500 introduces Z noise even on beacon
horizontal_move_z: 5                # was 2 - safer travel over warped beds
mesh_min: 30, 30                    # was 40,40 - push closer to edges
mesh_max: 320, 320                  # was 310,310 - Y limited by 20.6 offset
zero_reference_position: 175, 175
fade_start: 1.0                     # was 0.6 - more first layer correction
fade_end: 10.0
probe_count: 25, 25                 # was 11,11 - beacon scans this in seconds
algorithm: bicubic
mesh_pps: 2, 2

#####################################################################
#   Quad Gantry Level
#####################################################################
[quad_gantry_level]
gantry_corners:
    -60, -10
    410, 420
points:
    50, 50
    50, 300
    300, 300
    300, 50
speed: 500
horizontal_move_z: 5                # was 10 - beacon proximity is most accurate at 2-5mm
retries: 5
retry_tolerance: 0.012              # was 0.0075 - 7.5um is beacon-tight, caused retry loops
max_adjust: 10

#####################################################################
#   Fan Control
#####################################################################
## Print Cooling Fan
[fan]
pin: EBBCan:gpio13
kick_start_time: 2
min_power: 0.10

## Hotend Fan
[heater_fan hotend_fan]
pin: EBBCan:gpio14
heater: extruder
heater_temp: 50.0
max_power: 1.0
kick_start_time: 0.5

## Electronics Cooling Fans - controller bay (PE5, PD12) + stepper drivers (PD13, PD14)
## Grouped via multi_pin and driven by one controller_fan definition.
## Runs when any stepper is energized OR any listed heater is on.
## Idles off after 60s when the printer is sitting unused.
[multi_pin electronics_cooling_pins]
pins: PE5, PD12, PD13, PD14

[controller_fan electronics_cooling_fans]
pin: multi_pin:electronics_cooling_pins
kick_start_time: 0.5
fan_speed: 1.0
idle_timeout: 60
idle_speed: 0.3                     # was 1.0 - fans now actually idle after stepper timeout
heater: heater_bed, extruder
stepper: stepper_x, stepper_y, stepper_z, stepper_z1, stepper_z2, stepper_z3

## Bed Circulation Fans (under-bed, push warm air up into chamber)
## NOTE: Historically named "nevermore" - the actual StealthMax filter is not yet installed.
## When installed, the real filter will get its own [nevermore] block.
[output_pin bed_circulation_fans]
pin: PA8
value: 0
shutdown_value: 0

#####################################################################
#   Temperature Sensors
#####################################################################
[temperature_sensor MCU]
sensor_type: temperature_mcu

[temperature_sensor SoC]
sensor_type: temperature_host

[temperature_sensor EBB_NTC]
sensor_type: Generic 3950
sensor_pin: EBBCan:gpio28

#####################################################################
#   Lighting
#####################################################################
[output_pin chamber_light]
pin: PA0
pwm: true
shutdown_value: 1
cycle_time: 0.01

[neopixel sb_leds]
pin: EBBCan:gpio16
chain_count: 3
color_order: GRBW
initial_RED: 1.0
initial_GREEN: 0.0
initial_BLUE: 1.0
initial_WHITE: 0.0

#####################################################################
#   Accelerometer / Input Shaper
#####################################################################
# Rev H has built-in accelerometer - registered automatically as 'beacon'
[resonance_tester]
accel_chip: beacon
probe_points:
    175, 175, 20
accel_per_hz: 75                    # was 100 - 100 can saturate built-in accel
sweeping_accel: 400
sweeping_period: 0

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 56.8
damping_ratio_x: 0.045
shaper_type_y: mzv
shaper_freq_y: 37.2
damping_ratio_y: 0.075

[shaketune]
result_folder: ~/printer_data/config/ShakeTune_results
number_of_results_to_keep: 10
keep_raw_data: False
show_macros_in_webui: True
timeout: 600
measurements_chunk_size: 2
max_freq: 200
dpi: 300

#####################################################################
#   Board Pins
#####################################################################
[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE7,  EXP1_2=PG1,
    EXP1_3=PG0,  EXP1_4=PF15,
    EXP1_5=PF14, EXP1_6=PF13,
    EXP1_7=PF12, EXP1_8=PF11,
    EXP1_9=<GND>, EXP1_10=<5V>,
    # EXP2 header
    EXP2_1=PE13, EXP2_2=PE12,
    EXP2_3=PE15, EXP2_4=PE11,
    EXP2_5=PE10, EXP2_6=PE14,
    EXP2_7=PE8,  EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>

#####################################################################
#   Homing and Sensorless Homing
#####################################################################
[gcode_macro _HOME_PRE_AXIS]
description: Lower current before sensorless home
gcode:
    {% set HOME_CURRENT = 0.49 %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT}

[gcode_macro _HOME_POST_AXIS]
description: Restore current and move away after sensorless home
gcode:
    {% set axis = params.AXIS %}
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc2209 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}
    SAVE_GCODE_STATE NAME=home_post_axis
    G91
    {% if axis == 'X' %}
        G0 X-15 F3600
    {% else %}
        G0 Y-15 F3600
    {% endif %}
    RESTORE_GCODE_STATE NAME=home_post_axis
    M400
    G4 P200                                                # was P1000 - clear stallguard state, ms-scale not s-scale
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}

[gcode_macro CG28]
description: Conditional home - only homes if not already homed
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

#####################################################################
#   StealthBurner LED Macros
#####################################################################
[gcode_macro _sb_vars]
variable_colors: {
        'logo': {
            'busy':         {'r': 0.4,  'g': 0.0,  'b': 0.0,  'w': 0.0},
            'cleaning':     {'r': 0.0,  'g': 0.02, 'b': 0.5,  'w': 0.0},
            'calibrating_z':{'r': 0.8,  'g': 0.0,  'b': 0.35, 'w': 0.0},
            'heating':      {'r': 0.3,  'g': 0.18, 'b': 0.0,  'w': 0.0},
            'homing':       {'r': 0.0,  'g': 0.6,  'b': 0.2,  'w': 0.0},
            'leveling':     {'r': 0.5,  'g': 0.1,  'b': 0.4,  'w': 0.0},
            'meshing':      {'r': 0.2,  'g': 1.0,  'b': 0.0,  'w': 0.0},
            'off':          {'r': 0.0,  'g': 0.0,  'b': 0.0,  'w': 0.0},
            'printing':     {'r': 1.0,  'g': 0.0,  'b': 0.0,  'w': 0.0},
            'standby':      {'r': 0.01, 'g': 0.01, 'b': 0.01, 'w': 0.1},
        },
        'nozzle': {
            'heating':      {'r': 0.8, 'g': 0.35, 'b': 0.0, 'w': 0.0},
            'off':          {'r': 0.0, 'g': 0.0,  'b': 0.0, 'w': 0.0},
            'on':           {'r': 0.8, 'g': 0.8,  'b': 0.8, 'w': 1.0},
            'standby':      {'r': 0.6, 'g': 0.0,  'b': 0.0, 'w': 0.0},
        },
        'thermal': {
            'hot':          {'r': 1.0, 'g': 0.0, 'b': 0.0, 'w': 0.0},
            'cold':         {'r': 0.3, 'g': 0.0, 'b': 0.3, 'w': 0.0}
        }
    }
variable_logo_led_name:   "sb_leds"
variable_logo_idx:        "1"
variable_nozzle_led_name: "sb_leds"
variable_nozzle_idx:      "2,3"
gcode:
    # Required section - do not delete

[gcode_macro _set_sb_leds]
gcode:
    {% set red = params.RED|default(0)|float %}
    {% set green = params.GREEN|default(0)|float %}
    {% set blue = params.BLUE|default(0)|float %}
    {% set white = params.WHITE|default(0)|float %}
    {% set led = params.LED|string %}
    {% set idx = (params.IDX|string).split(',') %}
    {% set transmit_last = params.TRANSMIT|default(1) %}
    {% for led_index in idx %}
        {% set transmit = transmit_last if loop.last else 0 %}
        set_led led={led} red={red} green={green} blue={blue} white={white} index={led_index} transmit={transmit}
    {% endfor %}

[gcode_macro _set_sb_leds_by_name]
gcode:
    {% set leds_name = params.LEDS %}
    {% set color_name = params.COLOR %}
    {% set color = printer["gcode_macro _sb_vars"].colors[leds_name][color_name] %}
    {% set led = printer["gcode_macro _sb_vars"][leds_name + "_led_name"] %}
    {% set idx = printer["gcode_macro _sb_vars"][leds_name + "_idx"] %}
    {% set transmit = params.TRANSMIT|default(1) %}
    _set_sb_leds led={led} red={color.r} green={color.g} blue={color.b} white={color.w} idx="{idx}" transmit={transmit}

[gcode_macro _set_logo_leds]
gcode:
    {% set red = params.RED|default(0)|float %}
    {% set green = params.GREEN|default(0)|float %}
    {% set blue = params.BLUE|default(0)|float %}
    {% set white = params.WHITE|default(0)|float %}
    {% set led = printer["gcode_macro _sb_vars"].logo_led_name %}
    {% set idx = printer["gcode_macro _sb_vars"].logo_idx %}
    {% set transmit = params.TRANSMIT|default(1) %}
    _set_sb_leds led={led} red={red} green={green} blue={blue} white={white} idx="{idx}" transmit={transmit}

[gcode_macro _set_nozzle_leds]
gcode:
    {% set red = params.RED|default(0)|float %}
    {% set green = params.GREEN|default(0)|float %}
    {% set blue = params.BLUE|default(0)|float %}
    {% set white = params.WHITE|default(0)|float %}
    {% set led = printer["gcode_macro _sb_vars"].nozzle_led_name %}
    {% set idx = printer["gcode_macro _sb_vars"].nozzle_idx %}
    {% set transmit = params.TRANSMIT|default(1) %}
    _set_sb_leds led={led} red={red} green={green} blue={blue} white={white} idx="{idx}" transmit={transmit}

[gcode_macro set_logo_leds_off]
gcode:
    {% set transmit = params.TRANSMIT|default(1) %}
    _set_logo_leds red=0 blue=0 green=0 white=0 transmit={transmit}

[gcode_macro set_nozzle_leds_on]
gcode:
    {% set transmit = params.TRANSMIT|default(1) %}
    _set_sb_leds_by_name leds="nozzle" color="on" transmit={transmit}

[gcode_macro set_nozzle_leds_off]
gcode:
    {% set transmit = params.TRANSMIT|default(1) %}
    _set_sb_leds_by_name leds="nozzle" color="off" transmit={transmit}

[gcode_macro status_off]
gcode:
    set_logo_leds_off transmit=0
    set_nozzle_leds_off

[gcode_macro status_ready]
gcode:
    _set_sb_leds_by_name leds="logo" color="standby" transmit=0
    _set_sb_leds_by_name leds="nozzle" color="standby" transmit=1

[gcode_macro status_busy]
gcode:
    _set_sb_leds_by_name leds="logo" color="busy" transmit=0
    set_nozzle_leds_on

[gcode_macro status_heating]
gcode:
    _set_sb_leds_by_name leds="logo" color="heating" transmit=0
    _set_sb_leds_by_name leds="nozzle" color="heating" transmit=1

[gcode_macro status_leveling]
gcode:
    _set_sb_leds_by_name leds="logo" color="leveling" transmit=0
    set_nozzle_leds_on

[gcode_macro status_homing]
gcode:
    _set_sb_leds_by_name leds="logo" color="homing" transmit=0
    set_nozzle_leds_on

[gcode_macro status_cleaning]
gcode:
    _set_sb_leds_by_name leds="logo" color="cleaning" transmit=0
    set_nozzle_leds_on

[gcode_macro status_meshing]
gcode:
    _set_sb_leds_by_name leds="logo" color="meshing" transmit=0
    set_nozzle_leds_on

[gcode_macro status_calibrating_z]
gcode:
    _set_sb_leds_by_name leds="logo" color="calibrating_z" transmit=0
    set_nozzle_leds_on

[gcode_macro status_printing]
gcode:
    _set_sb_leds_by_name leds="logo" color="printing" transmit=0
    set_nozzle_leds_on

#####################################################################
#   Print Macros
#####################################################################
[gcode_macro PRINT_START]
gcode:
    {% set target_bed = params.BED|int %}
    {% set target_extruder = params.EXTRUDER|int %}
    {% set target_chamber = params.CHAMBER|default(45)|int %}
    {% set soak_time = params.SOAK|default(0)|int %}
    {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
    {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}
    STATUS_HOMING
    CHAMBER_LIGHT_ON
    G28
    G90
    BED_MESH_CLEAR
    # High temp bed (ABS/ASA) - heatsoak with chamber fans
    {% if target_bed > 90 %}
        SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"
        STATUS_HEATING
        M106 S128                                          # ~50% part fan for chamber mixing (not full power - was fighting bed)
        SET_PIN PIN=bed_circulation_fans VALUE=1           # Under-bed fans push warm air up
        # SET_PIN PIN=nevermore VALUE=1                    # TODO: uncomment when StealthMax filter is installed
        G1 X{x_wait} Y{y_wait} Z15 F9000
        M190 S{target_bed}
        SET_DISPLAY_TEXT MSG="Heatsoak: {target_chamber}c"
        # TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target_chamber}
    # Low temp bed (PLA/PETG)
    {% else %}
        SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"
        STATUS_HEATING
        G1 X{x_wait} Y{y_wait} Z15 F9000
        M190 S{target_bed}
        {% if soak_time > 0 %}
            SET_DISPLAY_TEXT MSG="Soak for {soak_time}s"
            G4 P{soak_time * 1000}
        {% endif %}
    {% endif %}
    # Heat hotend to safe probing temp (prevents ooze, safe for PEI)
    SET_DISPLAY_TEXT MSG="Hotend: 150c"
    M109 S150
    # Wipe only at 150c - just need a clean tip for contact probing
    STATUS_CLEANING
    SWIPE_CLEAN
    # Quad Gantry Level
    SET_DISPLAY_TEXT MSG="Leveling"
    STATUS_LEVELING
    QUAD_GANTRY_LEVEL
    # Contact Z home with auto calibration after QGL - recalibrates beacon model at print temp
    SET_DISPLAY_TEXT MSG="Contact Z home"
    STATUS_CALIBRATING_Z
    G28 Z METHOD=CONTACT CALIBRATE=1
    # Bed Mesh
    SET_DISPLAY_TEXT MSG="Bed mesh"
    STATUS_MESHING
    BED_MESH_CALIBRATE ADAPTIVE=1
    # Heat to final print temp
    SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"
    STATUS_HEATING
    G1 X{x_wait} Y{y_wait} Z15 F9000
    M107
    M109 S{target_extruder}
    # Full purge and wipe at print temp - clears all ooze, no prime line needed
    SET_DISPLAY_TEXT MSG="Purging and wiping"
    STATUS_CLEANING
    SWIPE_PURGE
    SKEW_PROFILE LOAD=Calilantern
    SET_DISPLAY_TEXT MSG="Printer goes brr"
    STATUS_PRINTING
    G0 Z20 F3000
    G0 X175 Y175 F9000

[gcode_macro PRINT_END]
gcode:
    {% set th = printer.toolhead %}
    {% set z_hop = [th.position.z + 20, th.axis_maximum.z - 5]|min %}
    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    M400
    G92 E0
    G1 E-2 F1800
    G90
    G0 Z{z_hop} F3000
    TURN_OFF_HEATERS
    G0 X{th.axis_maximum.x // 2} Y{th.axis_maximum.y - 5} F6000
    M107
    UPDATE_DELAYED_GCODE ID=bed_fans_off DURATION=600
    BED_MESH_CLEAR
    SET_SKEW CLEAR=1
    STATUS_READY
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END

#####################################################################
#   Utility Macros
#####################################################################
[gcode_macro _SWIPE_VARS]
description: Shared variables for all swipe macros
variable_bucket_x: 35
variable_bucket_y: 355.40
variable_bucket_z: -2
variable_purge_amount: 30
variable_purge_speed: 200
variable_brush_x_left: 82
variable_brush_x_right: 118
variable_brush_y: 349.40
variable_brush_z: -2
variable_travel_z: 10
variable_wipe_qty: 6
variable_wipe_spd: 10000
gcode:

[gcode_macro SWIPE_CLEAN]
description: Wipe only - no purge. Use before contact probing at 150c.
gcode:
    {% set v = printer["gcode_macro _SWIPE_VARS"] %}
    CG28
    G90
    G0 Z{v.travel_z} F3000
    G0 X{v.brush_x_left} Y{v.brush_y} F9000
    G0 Z{v.brush_z} F3000
    {% for wipes in range(1, (v.wipe_qty + 1)) %}
        G1 X{v.brush_x_right} F{v.wipe_spd}
        G1 X{v.brush_x_left} F{v.wipe_spd}
    {% endfor %}
    G0 Z{v.travel_z} F3000

[gcode_macro SWIPE_PURGE]
description: Full purge into bucket then wipe. Use after reaching print temp.
gcode:
    {% set v = printer["gcode_macro _SWIPE_VARS"] %}
    CG28
    G90
    G0 Z{v.travel_z} F3000
    # Purge into bucket
    G0 X{v.bucket_x} Y{v.bucket_y} F9000
    G0 Z{v.bucket_z} F3000
    G92 E0
    G1 E{v.purge_amount} F{v.purge_speed}
    G92 E0
    G1 E-2 F1800
    # Move to brush
    G0 Z{v.travel_z} F3000
    G0 X{v.brush_x_left} Y{v.brush_y} F9000
    G0 Z{v.brush_z} F3000
    {% for wipes in range(1, (v.wipe_qty + 1)) %}
        G1 X{v.brush_x_right} F{v.wipe_spd}
        G1 X{v.brush_x_left} F{v.wipe_spd}
    {% endfor %}
    G0 Z{v.travel_z} F3000

[gcode_macro SWIPE]
description: Alias for SWIPE_PURGE for backwards compatibility
gcode:
    SWIPE_PURGE

[gcode_macro CHAMBER_LIGHT_ON]
gcode:
    SET_PIN PIN=chamber_light VALUE=1.0

[gcode_macro CHAMBER_LIGHT_OFF]
gcode:
    SET_PIN PIN=chamber_light VALUE=0

[gcode_macro TOGGLE_CHAMBER_LIGHT]
gcode:
    {% if printer["output_pin chamber_light"].value == 0 %}
        CHAMBER_LIGHT_ON
    {% else %}
        CHAMBER_LIGHT_OFF
    {% endif %}

[gcode_macro G32]
description: Home, QGL, then home Z
gcode:
    BED_MESH_CLEAR
    CG28
    QUAD_GANTRY_LEVEL
    G28 Z

[gcode_macro CENTER]
description: Move toolhead to bed center
gcode:
    CG28
    G90
    G0 X175 Y175 Z30 F6000

[gcode_macro FRONT]
description: Move toolhead to front for nozzle changes / maintenance
gcode:
    CG28
    G90
    G0 X175 Y10 Z100 F6000

[gcode_macro LOAD_FILAMENT]
description: Load filament into extruder
gcode:
    {% set speed = params.SPEED|default(300)|int %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity %}
    SAVE_GCODE_STATE NAME=load_state
    G91
    G92 E0
    G1 E50 F{max_velocity * 60}
    G1 E25 F{speed}
    RESTORE_GCODE_STATE NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
description: Unload filament from extruder
gcode:
    {% set speed = params.SPEED|default(300)|int %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity %}
    SAVE_GCODE_STATE NAME=unload_state
    G91
    G92 E0
    G1 E10 F{speed}
    G1 E-75 F{max_velocity * 60}
    RESTORE_GCODE_STATE NAME=unload_state

[gcode_macro HEAT_SOAK]
description: Heat bed and wait for chamber to reach temperature
gcode:
    {% set target_bed = params.BED|default(110)|int %}
    {% set target_chamber = params.CHAMBER|default(50)|int %}
    {% set duration = params.DURATION|default(15)|int %}
    CG28
    G90
    G0 X175 Y175 Z30 F6000
    M106 S255
    SET_PIN PIN=bed_circulation_fans VALUE=1
    M190 S{target_bed}
    SET_DISPLAY_TEXT MSG="Heat soak: {duration} min"
    G4 P{duration * 60 * 1000}
    SET_DISPLAY_TEXT MSG="Soak complete"
    M107

[delayed_gcode bed_fans_off]
gcode:
    SET_PIN PIN=bed_circulation_fans VALUE=0

#####################################################################
#   TEST_SPEED - Andrew Ellis' speed test macro (Kalico-compatible)
#   https://ellis3dp.com/Print-Tuning-Guide/articles/determining_max_speeds_accels.html
#   Usage: TEST_SPEED SPEED=300 ACCEL=10000 ITERATIONS=5
#####################################################################
[gcode_macro TEST_SPEED]
description: Speed/accel torture test - run with increasing accels until skipping
gcode:
    # Speed in mm/s
    {% set speed  = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
    # Iterations (how many times to repeat the test pattern)
    {% set iterations = params.ITERATIONS|default(5)|int %}
    # Acceleration in mm/s^2
    {% set accel  = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
    # Minimum cruise ratio (Kalico/recent Klipper) - replaces ACCEL_TO_DECEL
    {% set min_cruise_ratio = params.MIN_CRUISE_RATIO|default(0.5)|float %}
    # Bounding inset for large pattern (helps prevent slamming after small skips)
    {% set bound = params.BOUND|default(20)|int %}
    # Size for small pattern box
    {% set smallpatternsize = SMALLPATTERNSIZE|default(20)|int %}

    # Large pattern boundaries
    {% set x_min = printer.toolhead.axis_minimum.x + bound %}
    {% set x_max = printer.toolhead.axis_maximum.x - bound %}
    {% set y_min = printer.toolhead.axis_minimum.y + bound %}
    {% set y_max = printer.toolhead.axis_maximum.y - bound %}

    # Small pattern boundaries (centered)
    {% set x_center = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float ) / 2 %}
    {% set y_center = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float ) / 2 %}
    {% set x_center_min = x_center - (smallpatternsize/2) %}
    {% set x_center_max = x_center + (smallpatternsize/2) %}
    {% set y_center_min = y_center - (smallpatternsize/2) %}
    {% set y_center_max = y_center + (smallpatternsize/2) %}

    # Save current gcode state (absolute/relative, etc)
    SAVE_GCODE_STATE NAME=TEST_SPEED

    # Output parameters to terminal
    { action_respond_info("TEST_SPEED: starting %d iterations at speed %d, accel %d" % (iterations, speed, accel)) }

    # Home and get position - QGL if not already done
    {% if printer.quad_gantry_level.applied == False %}
        {% if "xyz" not in printer.toolhead.homed_axes %}
            G28
        {% endif %}
        QUAD_GANTRY_LEVEL
        G28 Z
    {% endif %}
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    # Move to starting position
    G90
    G1 X{x_min} Y{y_min} Z10 F{speed*60}

    # Set new limits
    SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} MINIMUM_CRUISE_RATIO={min_cruise_ratio}

    {% for i in range(iterations) %}
        # Large pattern - diagonals
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}

        # Large pattern - box
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}

        # Small pattern - diagonals
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}

        # Small pattern - box
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
    {% endfor %}

    # Restore max speed/accel/min_cruise_ratio to their configured values
    SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio}

    # Re-home to verify no skipped steps
    G28
    # Move to center
    G90
    G1 X{x_center} Y{y_center} Z10 F{speed*60}

    # Restore previous gcode state
    RESTORE_GCODE_STATE NAME=TEST_SPEED

    { action_respond_info("TEST_SPEED: complete - check for skipping or position drift") }

#####################################################################
#   PARK
#####################################################################
[gcode_macro PARK]
description: Park toolhead safely - raises Z relative then moves to rear center
gcode:
    {% set z_raise = params.Z|default(20)|int %}
    {% set th = printer.toolhead %}
    {% set z_safe = [th.position.z + z_raise, th.axis_maximum.z - 5]|min %}
    SAVE_GCODE_STATE NAME=park_state
    G90
    G0 Z{z_safe} F3000
    G0 X{th.axis_maximum.x / 2} Y{th.axis_maximum.y - 5} F9000
    RESTORE_GCODE_STATE NAME=park_state

#####################################################################
#   CANCEL_PRINT
#####################################################################
## NOTE: rename_existing target is CANCEL_PRINT_OG (NOT CANCEL_PRINT_BASE).
## mainsail.cfg already renamed Klipper's built-in CANCEL_PRINT to CANCEL_PRINT_BASE.
## If we also renamed to CANCEL_PRINT_BASE, mainsail's macro would replace the built-in
## reference there and calling CANCEL_PRINT_BASE would recurse into itself.
## CANCEL_PRINT_BASE below still calls the actual built-in (preserved by mainsail.cfg).
[gcode_macro CANCEL_PRINT]
description: Cancel print cleanly with retract, park, and heaters off
rename_existing: CANCEL_PRINT_OG
gcode:
    {% set th = printer.toolhead %}
    {% set z_hop = [th.position.z + 20, th.axis_maximum.z - 5]|min %}
    SAVE_GCODE_STATE NAME=cancel_state
    M400
    G92 E0
    G1 E-5 F1800
    G90
    G0 Z{z_hop} F3000
    TURN_OFF_HEATERS
    M107
    G0 X{th.axis_maximum.x / 2} Y{th.axis_maximum.y - 5} F9000
    UPDATE_DELAYED_GCODE ID=bed_fans_off DURATION=300
    BED_MESH_CLEAR
    SET_SKEW CLEAR=1
    STATUS_READY
    RESTORE_GCODE_STATE NAME=cancel_state
    CANCEL_PRINT_BASE

#####################################################################
#   M600 - Filament Change
#####################################################################
[gcode_macro _M600_STATE]
variable_filament_change: False
gcode:

[gcode_macro M600]
description: Filament change - park, unload, wait for user, reload and resume
gcode:
    {% set th = printer.toolhead %}
    {% set z_raise = params.Z|default(20)|int %}
    {% set z_safe = [th.position.z + z_raise, th.axis_maximum.z - 5]|min %}
    SAVE_GCODE_STATE NAME=m600_state
    SET_GCODE_VARIABLE MACRO=_M600_STATE VARIABLE=filament_change VALUE=True
    PAUSE
    G90
    G0 Z{z_safe} F3000
    G0 X{th.axis_maximum.x / 2} Y{th.axis_maximum.y - 5} F9000
    STATUS_BUSY
    SET_DISPLAY_TEXT MSG="Unloading..."
    UNLOAD_FILAMENT
    SET_DISPLAY_TEXT MSG="Load filament then RESUME"
    M117 Load filament then RESUME

## NOTE: rename_existing target is RESUME_OG (NOT RESUME_BASE).
## mainsail.cfg already renamed Klipper's built-in RESUME to RESUME_BASE.
## Calling RESUME_BASE here still hits the actual built-in (preserved by mainsail.cfg).
[gcode_macro RESUME]
description: Smart resume - primes and wipes after filament change, plain resume otherwise
rename_existing: RESUME_OG
## These variables mirror mainsail.cfg's RESUME interface.
## Required: mainsail.cfg PAUSE calls SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=last_extruder_temp
## and similar - Klipper errors if the variable isn't pre-declared on the active RESUME macro.
variable_last_extruder_temp: {'restore': False, 'temp': 0}
variable_restore_idle_timeout: 0
variable_idle_state: False
gcode:
    {% if printer["gcode_macro _M600_STATE"].filament_change %}
        SET_DISPLAY_TEXT MSG="Priming..."
        LOAD_FILAMENT
        SWIPE
        SET_GCODE_VARIABLE MACRO=_M600_STATE VARIABLE=filament_change VALUE=False
        RESTORE_GCODE_STATE NAME=m600_state MOVE=1 MOVE_SPEED=100
    {% endif %}
    STATUS_PRINTING
    SET_DISPLAY_TEXT MSG="Resuming print"
    RESUME_BASE

