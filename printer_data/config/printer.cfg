#####################################################################
#   M109 Override - Fix temperature settle on low-inertia hotends
#####################################################################
[gcode_macro _USER_VARIABLES]
variable_fix_heaters_temperature_settle: True
gcode:

[gcode_macro M109]
rename_existing: M109.1
gcode:
    {% set S = params.S|float %}
    {% set actual_temp = printer.extruder.temperature|float %}
    {% set fix = printer["gcode_macro _USER_VARIABLES"].fix_heaters_temperature_settle %}
    {% if fix %}
        M104 {% for p in params %}{'%s%s ' % (p, params[p])}{% endfor %}
        {% if S != 0 %}
            {% if actual_temp <= S %}
                TEMPERATURE_WAIT SENSOR=extruder MINIMUM={S}
            {% else %}
                TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={S}
            {% endif %}
        {% endif %}
    {% else %}
        M109.1 {% for p in params %}{'%s%s ' % (p, params[p])}{% endfor %}
    {% endif %}

